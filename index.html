<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Peladeiros FTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
            color: #000;
            min-height: 100vh;
        }

        header {
            background: #000;
            border-bottom: 4px solid #ffca28;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 { font-size: 18px; font-weight: 900; color: #ffca28; text-transform: uppercase; letter-spacing: 1px; }
        header span { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 400; }

        .container { max-width: 700px; margin: 0 auto; padding: 28px 20px; }

        /* STEPS */
        .steps { display: flex; margin-bottom: 32px; }
        .step { flex: 1; text-align: center; position: relative; }
        .step::after { content: ''; position: absolute; top: 15px; left: 50%; width: 100%; height: 2px; background: #ddd; z-index: 0; }
        .step:last-child::after { display: none; }
        .step-dot { width: 30px; height: 30px; border-radius: 50%; background: #e0e0e0; color: #999; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; position: relative; z-index: 1; transition: all 0.3s; }
        .step.active .step-dot { background: #000; color: #ffca28; }
        .step.done .step-dot { background: #000; color: #ffca28; }
        .step-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .step.active .step-lbl { color: #000; }
        .step.done .step-lbl { color: #000; }

        /* CARDS */
        .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { font-size: 13px; font-weight: 900; color: #000; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 18px; }

        /* UPLOAD */
        .drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 36px 20px; text-align: center; cursor: pointer; position: relative; transition: all 0.2s; }
        .drop-zone:hover, .drop-zone.over { border-color: #000; background: rgba(0,0,0,0.02); }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .drop-icon { font-size: 44px; margin-bottom: 10px; }
        .drop-zone strong { display: block; font-size: 15px; color: #000; margin-bottom: 4px; font-weight: 700; }
        .drop-zone p { font-size: 13px; color: #888; }
        .preview { max-width: 100%; max-height: 280px; border-radius: 8px; margin-top: 16px; border: 2px solid #000; display: none; }

        /* BTN */
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: 4px; font-size: 14px; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.2s; font-family: 'Montserrat', sans-serif; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-yellow { background: #000; color: #ffca28; }
        .btn-yellow:hover:not(:disabled) { background: #ffca28; color: #000; }
        .btn-green { background: #000; color: #ffca28; }
        .btn-green:hover:not(:disabled) { background: #ffca28; color: #000; }
        .btn-ghost { background: transparent; color: #000; border: 2px solid #000; }
        .btn-ghost:hover { background: #000; color: #ffca28; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-row .btn-ghost { flex: 1; }
        .btn-row .btn-green { flex: 2; }

        /* LOADING */
        .loading { display: none; text-align: center; padding: 40px 20px; }
        .loading.show { display: block; }
        .spin { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #ffca28; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: #666; font-size: 14px; font-weight: 700; }

        /* JOGOS */
        .jogo { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; margin-bottom: 7px; font-size: 13px; }
        .jogo-n { font-size: 10px; color: #bbb; width: 22px; flex-shrink: 0; font-weight: 700; }
        .jogo-t { flex: 1; }
        .jogo-t.w { color: #000; font-weight: 700; }
        .jogo-t.l { color: #aaa; }
        .placar { background: #000; color: #ffca28; border: none; padding: 3px 10px; border-radius: 4px; font-family: monospace; font-size: 12px; font-weight: 700; min-width: 68px; text-align: center; }
        .sw { color: #ffca28; }
        .sl { color: rgba(255,202,40,0.55); }

        .data-tag { display: inline-block; background: #ffca28; color: #000; font-size: 12px; font-weight: 900; padding: 3px 12px; border-radius: 4px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .count { font-size: 12px; color: #888; margin-bottom: 14px; font-weight: 700; }
        .count strong { color: #000; }

        .divider { border: none; border-top: 2px solid #f0f0f0; margin: 18px 0; }
        .section-sm { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 900; }

        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; margin-bottom: 6px; font-size: 13px; font-weight: 700; }
        .rank-delta { color: #000; font-weight: 900; font-family: monospace; }

        .alert { padding: 11px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; display: none; font-weight: 700; }
        .alert.show { display: block; }
        .alert-err { background: rgba(200,0,0,0.06); border: 1px solid rgba(200,0,0,0.2); color: #c00; }
        .alert-info { background: rgba(255,202,40,0.12); border: 1px solid rgba(255,202,40,0.4); color: #6b5000; font-size: 12px; }

        /* SUCCESS */
        .success { display: none; text-align: center; padding: 48px 20px; }
        .success.show { display: block; }
        .success-icon { font-size: 60px; margin-bottom: 14px; }
        .success h2 { color: #000; font-size: 22px; margin-bottom: 8px; font-weight: 900; text-transform: uppercase; }
        .success p { color: #666; font-size: 14px; margin-bottom: 6px; }
        .success a { color: #000; font-weight: 900; text-decoration: underline; }

        /* EDIT MODE */
        .card-title-row { display: flex; align-items: center; justify-content: space-between; }
        .btn-edit { background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; transition: background 0.2s; line-height: 1; }
        .btn-edit:hover { background: rgba(0,0,0,0.06); }
        .btn-save-edit { background: #000 !important; color: #ffca28 !important; font-size: 11px !important; font-weight: 900 !important; padding: 5px 12px !important; border-radius: 4px; letter-spacing: 0.5px; font-family: 'Montserrat', sans-serif; }
        .btn-save-edit:hover { background: #ffca28 !important; color: #000 !important; }
        .edit-input { background: #fff; border: 2px solid #000; color: #000; border-radius: 4px; padding: 4px 8px; font-size: 13px; font-family: 'Montserrat', sans-serif; min-width: 0; font-weight: 700; }
        .edit-input:focus { outline: none; border-color: #ffca28; }
        .inp-t { flex: 1; }
        .inp-p { width: 72px; text-align: center; font-family: monospace; flex-shrink: 0; }
        .btn-del { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; color: #c00; transition: background 0.2s; flex-shrink: 0; }
        .btn-del:hover { background: rgba(200,0,0,0.08); }
        .jogo-edit-row { display: flex; align-items: center; gap: 6px; padding: 7px 10px; background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 7px; }
        .jogo-n-edit { font-size: 10px; color: #bbb; width: 22px; flex-shrink: 0; font-weight: 700; }

        /* LOGIN */
        #loginOverlay { position: fixed; inset: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .login-box { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 36px 28px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .login-logo { font-size: 16px; font-weight: 900; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .login-sub { font-size: 13px; color: #888; margin-bottom: 28px; font-weight: 700; }
        .login-label { display: block; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700; }
        .login-input { width: 100%; background: #fff; border: 2px solid #000; color: #000; border-radius: 4px; padding: 11px 14px; font-size: 14px; font-family: 'Montserrat', sans-serif; margin-bottom: 16px; box-sizing: border-box; font-weight: 700; }
        .login-input:focus { outline: none; border-color: #ffca28; }
        .login-err { color: #c00; font-size: 13px; text-align: center; margin-bottom: 14px; min-height: 18px; font-weight: 700; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="login-box">
        <img src="https://rubensbmelo.github.io/PeladeirosFTV/img/Peladeiros.jpeg" alt="Logo Peladeiros" style="width: 100px; height: 100px; object-fit: cover; display: block; margin: 0 auto 16px; border-radius: 50%; background: transparent; mix-blend-mode: multiply;">
        <div class="login-logo">Peladeiros FTV</div>
        <div class="login-sub">Painel administrativo</div>
        <label class="login-label" for="loginUser">Usuário</label>
        <input class="login-input" type="text" id="loginUser" autocomplete="username" placeholder="usuário">
        <label class="login-label" for="loginPass">Senha</label>
        <input class="login-input" type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••">
        <div class="login-err" id="loginErr"></div>
        <button class="btn btn-yellow" id="btnLogin">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">

<header>
    <h1>Peladeiros FTV <span>— Admin</span></h1>
</header>

<div class="container">

    <div class="steps">
        <div class="step active" id="s1"><div class="step-dot">1</div><div class="step-lbl">Foto</div></div>
        <div class="step" id="s2"><div class="step-dot">2</div><div class="step-lbl">IA</div></div>
        <div class="step" id="s3"><div class="step-dot">3</div><div class="step-lbl">Confirmar</div></div>
        <div class="step" id="s4"><div class="step-dot">4</div><div class="step-lbl">Publicar</div></div>
    </div>

    <div class="alert alert-err" id="alertBox"></div>

    <!-- UPLOAD -->
    <div id="panelUpload">
        <div class="card">
            <div class="card-title">📷 Foto da planilha</div>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" capture="environment">
                <div id="dropContent">
                    <div class="drop-icon">📋</div>
                    <strong>Toque para selecionar a foto</strong>
                    <p>JPG, PNG ou qualquer imagem</p>
                </div>
                <img id="previewImg" class="preview">
            </div>
        </div>

        <button class="btn btn-yellow" id="btnInterpretar" disabled>
            ✨ Interpretar com IA
        </button>
    </div>

    <!-- LOADING -->
    <div class="loading" id="panelLoading">
        <div class="spin"></div>
        <p id="loadingMsg">Processando...</p>
    </div>

    <!-- CONFIRMAR -->
    <div id="panelConfirm" style="display:none">
        <div class="card">
            <div class="card-title card-title-row">
                <span>✅ Confirmar jogos</span>
                <button class="btn-edit" id="btnEdit" onclick="toggleEdit()">✏️</button>
            </div>
            <div id="confirmContent"></div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="reset()">↩ Refazer</button>
                <button class="btn btn-green" id="btnPublicar">🚀 Publicar no site</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS -->
    <div class="success" id="panelSuccess">
        <div class="success-icon">🏆</div>
        <h2>Publicado!</h2>
        <p>O site será atualizado em instantes.</p>
        <p><a href="https://rubensbmelo.github.io/PeladeirosFTV/jogos.html" target="_blank">👉 Ver site atualizado</a></p>
        <br>
        <button class="btn btn-ghost" onclick="reset()" style="max-width:200px;margin:0 auto">+ Novo upload</button>
    </div>

</div>

</div><!-- /#app -->

<script>
    // ── LOGIN ──────────────────────────────────────────────────────
    if (sessionStorage.getItem('admin_auth') === '1') showApp();

    document.getElementById('btnLogin').addEventListener('click', doLogin);
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

    async function doLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value;
        const errEl = document.getElementById('loginErr');
        errEl.textContent = '';
        if (!user || !pass) { errEl.textContent = 'Preencha usuário e senha'; return; }

        const btn = document.getElementById('btnLogin');
        btn.disabled = true; btn.textContent = 'Verificando...';

        try {
            const res  = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, password: pass })
            });
            const json = await res.json();
            if (json.ok) {
                sessionStorage.setItem('admin_auth', '1');
                showApp();
            } else {
                errEl.textContent = json.error || 'Credenciais inválidas';
                btn.disabled = false; btn.textContent = 'Entrar';
                document.getElementById('loginPass').value = '';
                document.getElementById('loginPass').focus();
            }
        } catch {
            errEl.textContent = 'Erro de conexão';
            btn.disabled = false; btn.textContent = 'Entrar';
        }
    }

    function showApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    // ── CONFIG ─────────────────────────────────────────────────────
    // Troca pela URL do seu deploy no Vercel depois de publicar
    const API_URL = '/api/processar';

    let imgB64 = null, imgMime = null, parsedData = null;
    let editMode = false;

    // ── FILE INPUT ─────────────────────────────────────────────────
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const result = ev.target.result;
            imgB64  = result.split(',')[1];
            imgMime = file.type;
            const img = document.getElementById('previewImg');
            img.src = result;
            img.style.display = 'block';
            document.getElementById('dropContent').style.display = 'none';
            document.getElementById('btnInterpretar').disabled = false;
        };
        reader.readAsDataURL(file);
    });

    // drag & drop
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => {
        e.preventDefault(); dz.classList.remove('over');
        const file = e.dataTransfer.files[0];
        if (file) document.getElementById('fileInput').files = e.dataTransfer.files;
        document.getElementById('fileInput').dispatchEvent(new Event('change'));
    });

    // ── INTERPRETAR ────────────────────────────────────────────────
    document.getElementById('btnInterpretar').addEventListener('click', async () => {
        setStep(2); showPanel('loading'); setMsg('Analisando planilha com IA...');
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ acao: 'interpretar', imageBase64: imgB64, imageMime: imgMime })
            });
            const json = await res.json();
            if (!res.ok || !json.ok) throw new Error(json.error || 'Erro desconhecido');

            parsedData = json.data;
            renderConfirm(parsedData);
            setStep(3); showPanel('confirm');
        } catch (err) {
            showErr(err.message); showPanel('upload'); setStep(1);
        }
    });

    // ── RENDER CONFIRM ─────────────────────────────────────────────
    function renderConfirm(d) {
        const btnEdit = document.getElementById('btnEdit');
        if (editMode) {
            btnEdit.textContent = 'SALVAR EDIÇÕES';
            btnEdit.onclick = saveEdit;
            btnEdit.classList.add('btn-save-edit');

            let h = `<input class="edit-input" id="editData" value="${d.data}" style="margin-bottom:14px;max-width:160px">`;

            if (d.convidados?.length) {
                h += `<div class="alert-info alert show" style="margin-bottom:14px">
                    👥 Convidados (sem ranking): <strong>${d.convidados.join(', ')}</strong>
                </div>`;
            }

            h += `<div class="count"><strong>${d.jogos.length}</strong> jogos identificados</div>`;

            for (let i = 0; i < d.jogos.length; i++) {
                const j = d.jogos[i];
                h += `<div class="jogo-edit-row">
                    <span class="jogo-n-edit">#${i+1}</span>
                    <input class="edit-input inp-t" value="${j.t1}" placeholder="Time 1">
                    <input class="edit-input inp-p" value="${j.p}" placeholder="0 x 0">
                    <input class="edit-input inp-t" value="${j.t2}" placeholder="Time 2">
                    <button class="btn-del" onclick="deleteJogo(${i})" title="Deletar jogo">🗑️</button>
                </div>`;
            }

            document.getElementById('confirmContent').innerHTML = h;
            return;
        }

        btnEdit.textContent = '✏️';
        btnEdit.onclick = toggleEdit;
        btnEdit.classList.remove('btn-save-edit');

        let h = `<div class="data-tag">📅 ${d.data}</div>`;

        if (d.convidados?.length) {
            h += `<div class="alert-info alert show" style="margin-bottom:14px">
                👥 Convidados (sem ranking): <strong>${d.convidados.join(', ')}</strong>
            </div>`;
        }

        h += `<div class="count"><strong>${d.jogos.length}</strong> jogos identificados</div>`;

        for (let i = 0; i < d.jogos.length; i++) {
            const j = d.jogos[i];
            const [sw, sl] = j.p.split('x').map(s => parseInt(s));
            h += `<div class="jogo">
                <span class="jogo-n">#${i+1}</span>
                <span class="jogo-t w">${j.t1}</span>
                <span class="placar"><span class="sw">${sw}</span> x <span class="sl">${sl}</span></span>
                <span class="jogo-t l">${j.t2}</span>
            </div>`;
        }

        if (d.wins && Object.keys(d.wins).length) {
            h += `<hr class="divider"><div class="section-sm">🏅 Vitórias a adicionar</div>`;
            Object.entries(d.wins).sort((a,b)=>b[1]-a[1]).forEach(([n,v]) => {
                h += `<div class="rank-item"><span>${n}</span><span class="rank-delta">+${v}</span></div>`;
            });
        }

        document.getElementById('confirmContent').innerHTML = h;
        document.getElementById('btnPublicar').onclick = publicar;
    }

    // ── EDIT HELPERS ───────────────────────────────────────────────
    function toggleEdit() {
        if (!confirm('Tem certeza que deseja editar os jogos?')) return;
        editMode = true;
        renderConfirm(parsedData);
    }

    function readEditsFromDOM() {
        const dataInput = document.getElementById('editData');
        if (dataInput) parsedData.data = dataInput.value.trim();
        const rows = document.querySelectorAll('.jogo-edit-row');
        const inputs = Array.from(rows).map(r => r.querySelectorAll('.inp-t, .inp-p'));
        parsedData.jogos = Array.from(rows).map(r => {
            const cols = r.querySelectorAll('input');
            return { t1: cols[0].value.trim(), p: cols[1].value.trim(), t2: cols[2].value.trim() };
        });
    }

    function saveEdit() {
        readEditsFromDOM();
        const wins = {};
        const convidados = (parsedData.convidados || []).map(n => n.toLowerCase());
        for (const jogo of parsedData.jogos) {
            for (const nome of jogo.t1.split('/').map(n => n.trim())) {
                if (!convidados.some(c => nome.toLowerCase().includes(c))) {
                    wins[nome] = (wins[nome] || 0) + 1;
                }
            }
        }
        parsedData.wins = wins;
        editMode = false;
        renderConfirm(parsedData);
    }

    function deleteJogo(i) {
        readEditsFromDOM();
        parsedData.jogos.splice(i, 1);
        renderConfirm(parsedData);
    }

    // ── PUBLICAR ───────────────────────────────────────────────────
    async function publicar() {
        setStep(4); showPanel('loading'); setMsg('Publicando no GitHub...');
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ acao: 'publicar', dados: parsedData })
            });
            const json = await res.json();
            if (!res.ok || !json.ok) throw new Error(json.error || 'Erro ao publicar');
            showPanel('success');
        } catch (err) {
            showErr(err.message); showPanel('confirm'); setStep(3);
        }
    }

    // ── HELPERS ────────────────────────────────────────────────────
    function showPanel(name) {
        document.getElementById('panelUpload').style.display   = name==='upload'  ? 'block' : 'none';
        document.getElementById('panelLoading').className      = name==='loading' ? 'loading show' : 'loading';
        document.getElementById('panelConfirm').style.display  = name==='confirm' ? 'block' : 'none';
        document.getElementById('panelSuccess').className      = name==='success' ? 'success show' : 'success';
    }

    function setStep(n) {
        for (let i=1;i<=4;i++) {
            const el = document.getElementById(`s${i}`);
            el.classList.remove('active','done');
            if (i<n) el.classList.add('done');
            if (i===n) el.classList.add('active');
        }
    }

    function setMsg(m) { document.getElementById('loadingMsg').textContent = m; }

    function showErr(msg) {
        const b = document.getElementById('alertBox');
        b.className = 'alert alert-err show';
        b.textContent = '❌ ' + msg;
        setTimeout(()=>b.classList.remove('show'), 6000);
    }

    function reset() {
        imgB64=null; imgMime=null; parsedData=null; editMode=false;
        document.getElementById('fileInput').value='';
        document.getElementById('previewImg').style.display='none';
        document.getElementById('dropContent').style.display='block';
        document.getElementById('btnInterpretar').disabled=true;
        setStep(1); showPanel('upload');
    }

    showPanel('upload');
</script>
